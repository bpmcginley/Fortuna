# Builds the Windows installer + portable exe and attaches them to a GitHub
# Release whenever a v* tag is pushed. Publish flow:
#   npm version patch && git push --follow-tags
name: release

on:
  push:
    tags: ['v*']

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build and attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Fortuna ${{ github.ref_name }}'
          releaseDraft: true
          releaseBody: 'See the assets below. `*-setup.exe` is the installer. Windows may show a SmartScreen warning for unsigned apps — click "More info" → "Run anyway".'

      - name: Attach portable exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} src-tauri/target/release/fortuna.exe --clobber
